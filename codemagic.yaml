workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - APP_STORE_CONNECT_API_KEY
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    scripts:
      - name: Setup Flutter environment
        script: |
          flutter pub get
      - name: CocoaPods install
        script: |
          cd ios
          pod install --repo-update
          cd ..
      - name: Build iOS IPA
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - build/ios/logs/**
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
